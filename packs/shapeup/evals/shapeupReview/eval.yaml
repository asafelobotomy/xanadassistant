name: "shapeupReview-eval"
description: "Evaluates shapeupReview skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(Tier 1|blocking|pitch|scope discipline)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

name: "shapeupPitching-eval"
description: "Evaluates shapeupPitching skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(Problem|Appetite|Solution|Rabbit holes|No-gos)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

name: "shapeupCycleWork-eval"
description: "Evaluates shapeupCycleWork skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(hill chart|scope hammer|circuit breaker)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

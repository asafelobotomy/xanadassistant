name: "shapeupBetting-eval"
description: "Evaluates shapeupBetting skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(betting table|appetite|pitch)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

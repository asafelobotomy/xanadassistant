name: "ossChangelog-eval"
description: "Evaluates ossChangelog skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(Unreleased|Added|Fixed|Changed)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

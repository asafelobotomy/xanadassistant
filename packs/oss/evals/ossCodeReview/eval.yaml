name: "ossCodeReview-eval"
description: "Evaluates ossCodeReview skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(Correctness|Tests|API compat)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

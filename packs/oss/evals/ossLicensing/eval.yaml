name: "ossLicensing-eval"
description: "Evaluates ossLicensing skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(LICENSE|SPDX|MIT|Apache|GPL)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

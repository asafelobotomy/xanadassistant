name: "ossContributing-eval"
description: "Evaluates ossContributing skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(CONTRIBUTING|DCO|CLA|onboarding)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

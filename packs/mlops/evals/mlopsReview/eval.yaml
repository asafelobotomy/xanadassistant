name: "mlopsReview-eval"
description: "Evaluates mlopsReview skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(leakage:|reproducibility:|bias:)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

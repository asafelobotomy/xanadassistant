name: "mlopsModelServing-eval"
description: "Evaluates mlopsModelServing skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(registry|canary|rollback|drift)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

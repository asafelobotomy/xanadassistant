name: "mlopsExperiments-eval"
description: "Evaluates mlopsExperiments skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(reproducib|seed|baseline|metric)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

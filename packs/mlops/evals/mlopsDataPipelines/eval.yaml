name: "mlopsDataPipelines-eval"
description: "Evaluates mlopsDataPipelines skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(DVC|leakage|split|train)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

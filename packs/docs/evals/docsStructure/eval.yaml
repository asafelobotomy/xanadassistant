name: "docsStructure-eval"
description: "Evaluates docsStructure skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(Tutorial|How-to|Reference|Explanation|Diátaxis)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

name: "leanAndon-eval"
description: "Evaluates leanAndon skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(pull the cord|proceed|irreversible)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

name: "secureReview-eval"
description: "Evaluates secureReview skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(OWASP|A0[0-9]|Critical|High|Medium)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

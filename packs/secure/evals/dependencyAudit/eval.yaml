name: "dependencyAudit-eval"
description: "Evaluates dependencyAudit skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(CVE|OSV|severity|ecosystem)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

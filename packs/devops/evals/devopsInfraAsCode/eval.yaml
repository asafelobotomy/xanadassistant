name: "devopsInfraAsCode-eval"
description: "Evaluates devopsInfraAsCode skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(IaC|Terraform|Pulumi)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

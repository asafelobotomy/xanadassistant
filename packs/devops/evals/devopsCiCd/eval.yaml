name: "devopsCiCd-eval"
description: "Evaluates devopsCiCd skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(pipeline stage model or CI/CD)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

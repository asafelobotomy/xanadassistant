id: behavior-findings-first
description: "Verify review returns findings first with severity, evidence, and testing gaps"
prompt: |
  Review a pull request that changes bootstrap install behavior. Respond in review
  mode with findings first, ordered by severity, and include file evidence,
  residual risks, and testing gaps.
expected:
  - "review"
  - "Findings"
  - "Severity"
  - "evidence"
  - "testing"
tags:
  - smoke
  - behavior
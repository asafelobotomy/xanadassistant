id: basic-invocation
description: "Verify securityReview skill is invoked when asked to do a security-focused review of a code file"
tags: [smoke]
prompt: |
  Use the securityReview skill to review the following Python snippet for security issues:

  ```python
  def get_user(user_id):
      query = f"SELECT * FROM users WHERE id = {user_id}"
      return db.execute(query)
  ```
expected:
  - "SQL"
  - "injection"
expected_absent:
  - "(?i)I cannot|I'm not able to"

id: positive-trigger-2
description: "Verify Commit agent uses git MCP tools instead of runCommands for supported git operations"
prompt: |
  Which agent should use git_status, git_add, git_commit, and git_push for normal git work instead of falling back to runCommands when those MCP tools are available?
expected:
  - "Commit"
  - "git_status"
  - "git_add"
  - "git_commit"
  - "git_push"
expected_absent:
  - "(?i)runCommands"
tags:
  - smoke
  - positive
  - mcp

name: "xanadLifecycle-eval"
description: "Evaluates xanadLifecycle agent routing behaviour and response bounds"

graders:
  - type: text
    name: references_agent
    config:
      pattern: "(?is)(\\bxanadLifecycle\\b.*lifecycle|lifecycle.*\\bxanadLifecycle\\b)"

  - type: behavior
    name: completion_bound
    config:
      max_tokens: 2000

tasks:
  - "tasks/*.yaml"

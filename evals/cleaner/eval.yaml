name: "cleaner-eval"
description: "Evaluates cleaner agent routing behaviour and response bounds"

graders:
  - type: text
    name: references_agent
    config:
      pattern: "(?is)(\\bcleaner\\b.*repository hygiene|repository hygiene.*\\bcleaner\\b)"

  - type: behavior
    name: completion_bound
    config:
      max_tokens: 2000

tasks:
  - "tasks/*.yaml"

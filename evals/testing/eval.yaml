name: "testing-eval"
description: "Evaluates testing skill behavior for MCP-preferred test execution and failure handoff"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?is)(testing_show_capabilities.*testing_list_tests|testing_list_tests.*testing_run_tests|testing_show_capabilities.*testing_run_tests|testing_run_tests.*testing_show_capabilities|testing.*testing_run_tests|testing_run_tests.*testing)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 1000

tasks:
  - "tasks/*.yaml"

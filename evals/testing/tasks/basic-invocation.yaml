id: basic-invocation
description: "Verify testing skill prefers workspaceTesting tools and delegates unclear failures"
prompt: |
  Run the testing skill for a Python change. Use the workspace's declared test
  apparatus, inspect capabilities first, use testing_list_tests only if discovery
  is safely supported, prefer workspaceTesting testing_run_tests for targeted and
  full tests, summarize the result including runnerExitReason, and explain when
  to hand failures to Debugger.
expected:
  - "testing"
  - "testing_show_capabilities"
  - "testing_list_tests"
  - "testing_run_tests"
  - "testing_parse_coverage"
  - "runnerExitReason"
  - "targeted"
  - "full"
  - "Debugger"
tags:
  - basic
  - smoke
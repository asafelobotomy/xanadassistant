name: "Researcher-eval"
description: "Evaluates Researcher agent routing behaviour and response bounds"

graders:
  - type: text
    name: references_agent
    config:
      pattern: "(?is)(\\bResearcher\\b.*research|research.*\\bResearcher\\b)"

  - type: behavior
    name: completion_bound
    config:
      max_tokens: 2000

tasks:
  - "tasks/*.yaml"

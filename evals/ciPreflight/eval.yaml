name: "ciPreflight-eval"
description: "Evaluates ciPreflight skill behaviour"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(ciPreflight|preflight|staged)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"

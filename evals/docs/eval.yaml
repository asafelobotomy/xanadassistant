name: "docs-eval"
description: "Evaluates docs agent routing behaviour and response bounds"

graders:
  - type: text
    name: references_agent
    config:
      pattern: "(?is)(\\bdocs\\b.*(documentation|README|markdown|spellcheck)|(?:documentation|README|markdown|spellcheck).*\\bdocs\\b)"

  - type: behavior
    name: completion_bound
    config:
      max_tokens: 2000

tasks:
  - "tasks/*.yaml"

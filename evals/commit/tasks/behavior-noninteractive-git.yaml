id: behavior-noninteractive-git
description: "Verify commit uses non-interactive git MCP workflow and avoids amend without explicit request"
prompt: |
  Prepare a commit for the current changes. Explain the git workflow you should
  use, including status inspection, staging, commit message approval, and whether
  amending is allowed.
expected:
  - "commit"
  - "git_status"
  - "git_add"
  - "git_commit"
  - "approval"
  - "amend"
expected_absent:
  - "(?i)git commit --amend"
tags:
  - smoke
  - behavior
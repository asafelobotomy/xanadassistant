id: behavior-executable-plan
description: "Verify Planner produces an executable read-only plan with risks, files, stop conditions, and checks"
prompt: |
  Plan a multi-file remediation for lifecycle source resolution. Stay read-only
  and return exact candidate files, risks, stop conditions, and verification commands.
expected:
  - "Planner"
  - "candidate files"
  - "risks"
  - "stop conditions"
  - "verification"
expected_absent:
  - "(?i)I edited"
tags:
  - smoke
  - behavior
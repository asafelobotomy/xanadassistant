name: Workspace Health Check Report
description: "Automated xanadAssistant workspace health check report submitted by the xanadLifecycle agent."
title: "[Health Check] xanadAssistant <version> — <status>"
labels:
  - health-check-report
body:
  - type: markdown
    attributes:
      value: |
        > Health check reports are typically submitted automatically by the `xanadLifecycle` agent.
        > If submitting manually, fill in the required fields below.
  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: "e.g. 0.2.0"
    validations:
      required: true
  - type: dropdown
    id: install_state
    attributes:
      label: Install State
      options:
        - installed
        - partial
        - not-installed
    validations:
      required: true
  - type: dropdown
    id: check_status
    attributes:
      label: Check Status
      options:
        - clean
        - drift
        - error
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "e.g. linux, darwin, windows"
    validations:
      required: false
  - type: input
    id: python_version
    attributes:
      label: Python Version
      placeholder: "e.g. 3.12"
    validations:
      required: false
  - type: input
    id: label
    attributes:
      label: Workspace Label
      description: Optional alias provided via --label when running the health-report command.
      placeholder: "e.g. my-project"
    validations:
      required: false
  - type: textarea
    id: full_report
    attributes:
      label: Full Health Check Report (JSON)
      description: Paste the `result` block from `xanadAssistant health-report --json` output here.
      render: json
    validations:
      required: false

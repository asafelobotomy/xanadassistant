name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  attention-budget:
    name: Attention Budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check maintainer doc attention budgets
        run: python3 scripts/drift_preflight.py --check attention-budget

  loc-gate:
    name: LOC Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check line-count limits
        run: python3 scripts/drift_preflight.py --check loc

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install -r requirements-dev.txt
      - name: Run unit tests
        run: python3 scripts/drift_preflight.py --check tests

  freshness:
    name: Derived Artifact Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check manifest and catalog freshness
        run: python3 scripts/drift_preflight.py --check freshness

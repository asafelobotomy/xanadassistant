name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  attention-budget:
    name: Attention Budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check maintainer doc attention budgets
        run: python3 scripts/check_attention_budget.py

  loc-gate:
    name: LOC Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check line-count limits
        run: python3 scripts/check_loc.py

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install -r requirements-dev.txt
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

  freshness:
    name: Derived Artifact Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check manifest and catalog freshness
        run: |
          python3 -m scripts.lifecycle.check_manifest_freshness \
            --package-root . \
            --policy template/setup/install-policy.json \
            --manifest template/setup/install-manifest.json \
            --catalog template/setup/catalog.json

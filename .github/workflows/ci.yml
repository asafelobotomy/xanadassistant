name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  attention-budget:
    name: Attention Budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check maintainer doc attention budgets
        run: python3 scripts/drift_preflight.py --check attention-budget

  version-bump:
    name: Version References
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check version mirrors match VERSION
        run: python3 scripts/drift_preflight.py --check version-bump

  loc-gate:
    name: LOC Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check line-count limits
        run: python3 scripts/drift_preflight.py --check loc

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: pip install -r requirements-dev.txt -c constraints-dev.txt
      - name: Run unit tests
        run: python3 scripts/drift_preflight.py --check tests

  freshness:
    name: Derived Artifact Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check manifest and catalog freshness
        run: python3 scripts/drift_preflight.py --check freshness

  workspace-drift:
    name: Workspace Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check managed .github/ files are in sync with package source
        run: python3 scripts/drift_preflight.py --check workspace-drift

  parity:
    name: Managed File Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check installed .github/ copies match source (bypasses ownership skip model)
        run: python3 scripts/drift_preflight.py --check parity

  release:
    name: Publish Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - attention-budget
      - version-bump
      - loc-gate
      - test
      - freshness
      - workspace-drift
      - parity
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release decision
        id: release_decision
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 scripts/release_decision.py --repo-root . --github-output "$GITHUB_OUTPUT"

      - name: Build release changelog
        if: steps.release_decision.outputs.should_publish == 'true'
        env:
          TAG: ${{ steps.release_decision.outputs.tag }}
        run: |
          set -euo pipefail

          git fetch --tags --force
          previous_tag=$(git tag --sort=-version:refname | grep -Fxv "$TAG" | head -n 1 || true)

          {
            echo "# Changelog"
            echo
            echo "Release: $TAG"
            echo
            if [[ -n "$previous_tag" ]]; then
              echo "Changes since $previous_tag:"
              echo
              git log --reverse --pretty='- %s (%h)' "$previous_tag..$GITHUB_SHA"
              echo
              echo "Full diff: https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${TAG}"
            else
              echo "Initial release changes:"
              echo
              git log --reverse --pretty='- %s (%h)' "$GITHUB_SHA"
            fi
          } > RELEASE_NOTES.md

      - name: Publish GitHub release
        if: steps.release_decision.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.release_decision.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.release_decision.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md
